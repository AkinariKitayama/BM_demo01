<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BM Blend Test</title>
 <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="stage">
    <canvas id="view"></canvas>
    <div id="empty">モーションJSONを読み込んでください<br>（Load JSON）</div>
  </div>

  <aside id="panel">
    <div class="title">BM Blend Test — step 1</div>

    <div class="group">
      <label class="btn" for="file">Load JSON</label>
      <input id="file" type="file" accept="application/json,.json">
    </div>

    <hr>

    <!-- 再生ボタンとシークバー -->
 <div class="group">
  <div class="label">Playback</div>
  <button id="play" class="btn">Pause</button>
  <input id="frame" type="range" min="0" max="1000" value="0" step="1" disabled>
  <div class="row readout">
    <span id="frameNo">—</span>
    <span id="frameTime">— s</span>
  </div>
</div>

    <div class="group">
        <label class="check"><input id="smooth" type="checkbox" checked> Smoothing</label>
        <label class="check"><input id="lines" type="checkbox" checked> Line</label>
    </div>

<div class="group">
    <div class="label">Blend (triangle pad)</div>
    <canvas id="pad" width="180" height="160"></canvas>
    <div class="row readout"><span id="padW">1.00 / 0.00 / 0.00</span></div>
  </div>

<hr>

<div class="group">
  <div class="label">Speed — <span id="spAName">A</span> ×<span id="spAVal">11</span></div>
  <input id="speedA" type="range" min="0" max="20" step="0.1" value="11">
  <div class="label">Speed — <span id="spBName">B</span> ×<span id="spBVal">1</span></div>
  <input id="speedB" type="range" min="0" max="20" step="0.1" value="1">
</div>

<div class="label">Speed — <span id="spCName">C</span> ×<span 
  id="spCVal">1</span></div> 
    <input id="speedC" type="range" min="0" max="20" step="0.1" value="1">

<div class="group">
  <div class="label">Offset</div>
  <label class="srow"><span>X</span><input id="offX" type="range" min="-3" max="3" step="0.02" value="0"></label>
  <label class="srow"><span>Y</span><input id="offY" type="range" min="-3" max="3" step="0.02" value="0"></label>
</div>

<div class="group">
  <div class="label">Joint adjust</div>
  <select id="jointSel" class="btn"></select>
  <label class="srow"><span>X</span><input id="jx" type="range" min="-1.5" max="1.5" step="0.01" value="0"></label>
  <label class="srow"><span>Y</span><input id="jy" type="range" min="-1.5" max="1.5" step="0.01" value="0"></label>
  <button id="resetAdj" class="btn">Reset offsets</button>
</div>

    <hr>

    <div class="group">
      <div class="label">Source</div>
      <div class="meta" id="meta">
        <span>species</span><b id="m-name">—</b>
        <span>fps</span><b id="m-fps">—</b>
        <span>frames</span><b id="m-frames">—</b>
        <span>joints</span><b id="m-joints">—</b>
        <span>untracked</span><b id="m-untracked">—</b>
      </div>
    </div>
  </aside>

<script type="module" src="script.js"></script>

</body>
</html>
